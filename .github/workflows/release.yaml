name: Release Pi artifact

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Cross-build aarch64 + publish release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Avoid `lfs: true` so checkout succeeds when the org hits GitHub LFS
          # bandwidth limits. `link/scripts/bake-urdf.mjs` uses plain-git
          # fallbacks under `link/scripts/ci-lfs-fallback/meshes/` when needed.
          lfs: false

      - name: Compute version
        id: ver
        run: |
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          TAG="pi-${SHORT_SHA}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: link/package-lock.json

      - name: Build SPA
        working-directory: link
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      # Stable cache key (NOT keyed on commit SHA -- the previous setup
      # `aarch64-${short_sha}` invalidated the cache on every commit and
      # forced a cold compile every release. rust-cache@v2 already keys on
      # Cargo.lock + rustc version + target internally, so a fixed prefix
      # gives us cross-commit reuse while still busting on dependency
      # changes. Expect cold builds (deps changed) ~10-15min, warm builds
      # (just our crates changed) under a minute.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target
          key: aarch64
          cache-on-failure: true

      # sccache catches compilation units that rust-cache doesn't, in
      # particular the `cc`/`cmake` C builds inside crates like ring's
      # build script. Stacks with rust-cache; backed by GitHub Actions
      # cache so it works without external infra.
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build cortex for aarch64
        working-directory: crates
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
        run: |
          cargo build --release -p cortex --target aarch64-unknown-linux-gnu
          sccache --show-stats || true

      - name: Stage release tarball
        id: stage
        run: |
          STAGE="$(mktemp -d)"
          mkdir -p \
            "${STAGE}/bin" \
            "${STAGE}/config" \
            "${STAGE}/deploy/pi5" \
            "${STAGE}/docs/runbooks"

          # SPA is embedded into the cortex binary at build time via rust-embed
          # (see crates/cortex/build.rs); we do not ship link/dist/ separately.
          cp crates/target/aarch64-unknown-linux-gnu/release/cortex "${STAGE}/bin/cortex"
          chmod 0755 "${STAGE}/bin/cortex"

          cp -r config/. "${STAGE}/config/"
          cp deploy/pi5/cortex.service "${STAGE}/deploy/pi5/cortex.service"
          cp deploy/pi5/cortex-watchdog.sh "${STAGE}/deploy/pi5/cortex-watchdog.sh"
          cp deploy/pi5/cortex-watchdog.service "${STAGE}/deploy/pi5/cortex-watchdog.service"
          cp deploy/pi5/cortex-watchdog.timer "${STAGE}/deploy/pi5/cortex-watchdog.timer"
          cp deploy/pi5/cortex-update.sh "${STAGE}/deploy/pi5/cortex-update.sh"
          cp deploy/pi5/cortex-update.service "${STAGE}/deploy/pi5/cortex-update.service"
          cp deploy/pi5/cortex-update.timer "${STAGE}/deploy/pi5/cortex-update.timer"
          cp deploy/pi5/render-cortex-toml.sh "${STAGE}/deploy/pi5/render-cortex-toml.sh"
          cp deploy/pi5/apply-release.sh "${STAGE}/deploy/pi5/apply-release.sh"
          cp docs/runbooks/operator-console.md "${STAGE}/docs/runbooks/operator-console.md"

          # The shell scripts in the tarball must be executable. Git on
          # Windows checkouts (and GitHub Actions checkouts of repos whose
          # files were initially committed without +x) store them as 0644,
          # which trips `[[ -x ... ]]` in cortex-update.sh on the Pi.
          chmod 0755 \
            "${STAGE}/deploy/pi5/cortex-watchdog.sh" \
            "${STAGE}/deploy/pi5/cortex-update.sh" \
            "${STAGE}/deploy/pi5/render-cortex-toml.sh" \
            "${STAGE}/deploy/pi5/apply-release.sh"

          echo "${GITHUB_SHA}" > "${STAGE}/COMMIT_SHA"
          date -u +%Y-%m-%dT%H:%M:%SZ > "${STAGE}/BUILT_AT"

          TAR="${RUNNER_TEMP}/rudy-pi-${{ steps.ver.outputs.short_sha }}.tar.gz"
          tar -C "${STAGE}" -czf "${TAR}" .
          SHA256="$(sha256sum "${TAR}" | awk '{print $1}')"
          BYTES="$(stat -c '%s' "${TAR}")"

          echo "tar=${TAR}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "bytes=${BYTES}" >> "$GITHUB_OUTPUT"

      - name: Build latest.json manifest
        id: manifest
        run: |
          MANIFEST="${RUNNER_TEMP}/latest.json"
          ASSET_NAME="rudy-pi-${{ steps.ver.outputs.short_sha }}.tar.gz"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          DOWNLOAD_URL="${REPO_URL}/releases/download/${{ steps.ver.outputs.tag }}/${ASSET_NAME}"

          jq -n \
            --arg sha "${GITHUB_SHA}" \
            --arg short "${{ steps.ver.outputs.short_sha }}" \
            --arg tag "${{ steps.ver.outputs.tag }}" \
            --arg asset "${ASSET_NAME}" \
            --arg url "${DOWNLOAD_URL}" \
            --arg sha256 "${{ steps.stage.outputs.sha256 }}" \
            --argjson bytes "${{ steps.stage.outputs.bytes }}" \
            --arg built_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              schema: 1,
              commit_sha: $sha,
              short_sha: $short,
              tag: $tag,
              asset: $asset,
              url: $url,
              sha256: $sha256,
              bytes: $bytes,
              built_at: $built_at
            }' > "${MANIFEST}"

          cat "${MANIFEST}"
          echo "path=${MANIFEST}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Pi build ${{ steps.ver.outputs.short_sha }}
          body: |
            Automatic Pi build for `${{ github.sha }}`.

            - Asset: `rudy-pi-${{ steps.ver.outputs.short_sha }}.tar.gz`
            - sha256: `${{ steps.stage.outputs.sha256 }}`
            - bytes: `${{ steps.stage.outputs.bytes }}`

            Pi installations polling `latest.json` will pick this up automatically.
          make_latest: "true"
          files: |
            ${{ steps.stage.outputs.tar }}
            ${{ steps.manifest.outputs.path }}
