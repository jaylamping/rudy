# RobStride RS03 integrated actuator — Rudy canonical hardware spec.
#
# Numbers here mirror the vendor manual (docs/vendor/rs03-user-manual-260112.pdf)
# verbatim. URDF effort/velocity caps and joint limits should stay consistent
# with this file (see tests/). Per-motor firmware versions and CAN IDs live in
# config/actuators/inventory.yaml.
#
# Authoritative decisions: docs/decisions/0002-rs03-protocol-spec.md

schema_version: 2
actuator_model: RS03
manual_ref: docs/vendor/rs03-user-manual-260112.pdf

protocol:
  physical_layer: CAN_2_0B
  bitrate_bps: 1000000
  frame_format: extended_29bit
  data_length: 8

  # CAN arbitration ID layout (29 bits)
  id_layout:
    comm_type_bits: [24, 28]   # inclusive
    data_area_2_bits: [8, 23]
    dest_addr_bits: [0, 7]

  # Communication types relevant to the driver (decimal values).
  comm_types:
    get_device_id: 0
    op_control: 1
    feedback: 2
    motor_enable: 3
    motor_stop: 4
    set_mechanical_zero: 6
    set_can_id: 7
    param_read: 17
    param_write: 18              # RAM only; use save_params (22) to persist
    fault_feedback: 21
    save_params: 22
    set_baud: 23
    active_report: 24
    set_protocol: 25
    read_version: 26

# Physical capabilities (manual §1.2, §1.3).
hardware:
  voltage_rated_vdc: 48
  voltage_range_vdc: [24, 60]
  torque_rated_nm: 20.0
  torque_peak_nm: 60.0
  phase_current_rated_apk: 13.0
  phase_current_peak_apk: 43.0
  no_load_speed_rpm: 200
  encoder_resolution_bits: 14      # absolute, per turn
  gear_ratio: 9
  torque_constant_nm_per_arms: 2.36
  winding_limit_temp_c: 130        # MCU throttles; actual physical limit ~180 C
  board_overtemp_protection_c: 145

# MIT-style operation-control (type 1) raw→physical scaling.
# Each field is uint16 (0..65535) mapped linearly onto `range`.
op_control_scaling:
  position:
    units: rad
    range: [-12.566370614359172, 12.566370614359172]   # -4π .. +4π
  velocity:
    units: rad_per_s
    range: [-20.0, 20.0]
  kp:
    units: dimensionless
    range: [0.0, 5000.0]
  kd:
    units: dimensionless
    range: [0.0, 100.0]
  torque_ff:
    units: nm
    range: [-60.0, 60.0]

# Firmware-level limits (written via param_write + save_params).
# These are the *hardware* envelope; per-joint envelopes in URDF are tighter.
firmware_limits:
  run_mode:
    index: 0x7005
    type: uint8
    values:
      operation_mit: 0
      position_pp: 1
      velocity: 2
      current: 3
      position_csp: 5
  limit_torque:
    index: 0x700B
    type: float
    units: nm
    hardware_range: [0.0, 60.0]
  limit_spd:
    index: 0x7017
    type: float
    units: rad_per_s
    hardware_range: [0.0, 20.0]
  limit_cur:
    index: 0x7018
    type: float
    units: amps_peak
    hardware_range: [0.0, 43.0]
  can_timeout:
    index: 0x7028
    type: uint32
    units: counts      # 20000 counts == 1 s; 0 disables the feature
  zero_sta:
    index: 0x7029
    type: uint8
    description: "0 => report 0..2π; 1 => report -π..π"
  damper:
    index: 0x702A
    type: uint8
    description: "0 => damping ON when unpowered (default); 1 => damping OFF"
  add_offset:
    index: 0x702B
    type: float
    units: rad

# Observables.
observables:
  firmware_version:
    index: 0x1003
    type: string
  # NOTE on indices: the canonical numbers in the vendor manual are 0x30xx
  # (e.g. mechPos = 0x3016), but per ADR-0002 the 0x30xx namespace is NOT
  # reachable via type-17 single-frame reads. Use the 0x70xx shadow range
  # (manual §4.1.14), which is the only single-frame read path the Pi has.
  # `tools/robstride/rs03_can.py:PARAM_MECH_POS` and `crates/rudydae` both
  # read these via type-17 so we keep the spec aligned with what actually
  # works on the wire.
  mech_pos:
    index: 0x7019                     # shadow of 0x3016
    type: float
    units: rad
    description: "load-end mechanical angle after gearbox (type-17 shadow of 0x3016)"
  mech_vel:
    index: 0x701B                     # shadow of 0x3017
    type: float
    units: rad_per_s
    description: "load-end mechanical velocity (type-17 shadow of 0x3017)"
  vbus:
    index: 0x701C                     # shadow of 0x300C
    type: float
    units: volts
    description: "DC bus voltage (type-17 shadow of 0x300C)"
  fault_sta:
    index: 0x3022
    type: uint32
    description: |
      Fault bit field (manual §3.3.7). NOTE: NOT reachable via type-17
      per ADR-0002; populated only from type-2 motor-feedback frames
      (bits 16..21 of the reply arb ID) or the type-21 fault-feedback
      frame. The poll_once aux sweep best-efforts a type-17 read here
      and silently ignores the read-fail status.
  can_terminator_flag:
    index: 0x3041
    type: uint8
    description: "0 = onboard 240Ω present, 1 = no onboard terminator"

# Starter-conservative limits to write during first commissioning.
# These override hardware_range during bring-up.  Loosen per joint as confidence
# grows.  See tools/robstride/commission.md.
commissioning_defaults:
  limit_torque_nm: 5.0
  limit_spd_rad_s: 2.0
  limit_cur_a: 10.0
  can_timeout_counts: 20000   # 1 s; controller MUST heartbeat faster than this

thermal:
  max_winding_temp_c: 120
  derating_start_c: 100

notes:
  - "Verify per-unit firmware version + can_status BEFORE writing firmware limits."
  - "Any param write (type 18) is RAM only. A type 22 save is required to persist."
  - "Zero-calibration is only valid in MIT or CSP mode, not PP mode."
  - "See deploy/pi5/config.txt.example for Pi 5 + Waveshare 2-CH CAN HAT device tree hints."
