      warn_sta_current_hypothesis: |
        Best remaining guess: "cogging calibration not run" advisory.  The
        0.3.1.41 firmware introduced a cogging-calibration procedure
        (iq_test=1 -> reboot -> calibrate -> max_alve nonzero -> alveolous_open=1)
        and this motor has never had it run (max_alve still 0, iq_test still 0,
        alveolous_open still 0 in extract.xls @ 2026-04-17 03:27).  A
        "please-run-cogging-calibration" advisory bit that stays lit until
        max_alve becomes nonzero would be consistent with every observation.
        Not verified -- verification requires running the calibration.
      warn_sta_deferred_reason: |
        Deferred 2026-04-17 by user decision.  Rationale:
          - faultSta = 0 (no active faults)
          - all safety-critical params in flash and verified
          - bit is clearly advisory, not interlocking (motor jogged fine in
            Motor Studio with this warning set)
          - Pi-side CAN bring-up and driver bench-jog testing are higher-
            leverage work than chasing a single undocumented warning bit
            through a Chinese GUI.
        Revisit when: (a) we run cogging calibration for unrelated reasons
        (jitter/tracking-error reduction), or (b) warnSta grows new bits,
        which would indicate a real regression.
      notes: |
        Accidental factory-reset on 2026-04-17 wiped MechOffset and the three
        safety limits (limit_spd, limit_cur, CAN_TIMEOUT) back to factory
        defaults.  CAN_ID, CAN_MASTER, baud, damper, zero_sta were preserved.
        Zero + limits re-written same day and verified across a fresh PSU
        cycle (extract3.xls timestamp 03:21 on 2026-04-17).  All four
        safety-critical values persisted correctly.  Step 7 DONE.
