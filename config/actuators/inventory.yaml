    firmware_flashed_at: 2026-04-17
    firmware_notes: |-
      Flashed 2026-04-17 from 0.3.1.21 (Oct 22 2025 build) to 0.3.1.41 (Apr 3 2026 build) using Motor Studio v1.0.3. Bootloader unchanged (Jul 11 2024 build, shared across firmware line). All 0x20xx stored parameters carried over correctly through the flash — 0.3.1.41's "parameter backup storage region" feature did its job. See pre-flash and post-flash dumps in config/actuators/factory-dumps/.
      Between the two dumps, the CAN/power harness was moved from one side of the actuator to the other. The RS03 has two pass-through CAN connectors but only one has the onboard 240Ω terminator in-circuit, so can_status (0x3041) correctly flipped 1 -> 0 across the move. This is a wiring change, not a flash effect.
    jog_verified: false
