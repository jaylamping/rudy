# cortex operator-console daemon configuration.
#
# See ADR-0004 (docs/decisions/0004-operator-console.md) for the architecture.
# See docs/runbooks/operator-console.md for start/stop.

[http]
# Address cortex binds for the REST + SPA listener (always plaintext).
#
# On the Pi: `127.0.0.1:8443`. The Pi's `tailscale serve` (configured by
# deploy/pi5/bootstrap.sh) terminates TLS on the tailnet IP at :443 with the
# auto-managed Tailscale Let's Encrypt cert and proxies decrypted requests
# here. Operators browse `https://rudy-pi/` from any tailnet device.
#
# On dev machines: `127.0.0.1:8443` is fine; Vite proxies `/api/*` to it.
bind = "127.0.0.1:8443"

[webtransport]
# HTTP/3 / QUIC listener for the telemetry + log firehose.
#
# `tailscale serve` does NOT proxy HTTP/3, so WebTransport keeps doing its own
# TLS using the same Tailscale-issued cert. Bind to the tailnet IP on the Pi
# (`render-cortex-toml.sh` substitutes it at install time); leave on
# `127.0.0.1` for dev (where WT is typically disabled anyway since browsers
# require HTTP/3+TLS).
bind = "127.0.0.1:4433"
enabled = false
# cert_path = "/var/lib/rudy/cortex/tailscale/<host>.<tailnet>.ts.net.crt"
# key_path  = "/var/lib/rudy/cortex/tailscale/<host>.<tailnet>.ts.net.key"

[paths]
# All relative paths are resolved against the working directory cortex was
# launched from.
#
# `inventory` is read AND written by cortex (travel_limits / verified /
# rename PUTs all rewrite it atomically). For dev work the in-tree copy is
# fine because the editor and the daemon both have write access. On the
# Pi, `deploy/pi5/render-cortex-toml.sh` rewrites this to
# `/var/lib/rudy/inventory.yaml` (writable, preserved across releases) and
# adds an `inventory_seed = "/opt/rudy/config/actuators/inventory.yaml"`
# line so the first boot bootstraps from the release-tarball baseline.
actuator_spec = "./config/actuators/robstride_rs03.yaml"
inventory = "./config/actuators/inventory.yaml"
audit_log = "./.cortex/audit.jsonl"

[can]
# Left empty in Phase 1. On the Pi, a future block will list:
#   [[can.buses]]
#   iface = "can1"   # Linux netlink iface (see deploy/pi5/README.md for
#                    #   can0/can1 vs silkscreen labels)
#   bitrate = 1_000_000
# For now cortex emits mocked telemetry so the UI can be developed end-to-end.
mock = true

[telemetry]
# Type-17 sweep cadence for auxiliary observables (`fault_sta`, `vbus`)
# and fallback refresh when a motor is idle.
#
# Type-2 position/velocity/torque comes from firmware active reporting
# (type-24) configured at boot by:
# - `LinuxCanCore::ensure_active_report_100hz` (EPScan_time=1, enable type-24)
# - `LinuxCanCore::ensure_active_reporting_for_all` (boot-wide pass)
#
# Keep this at 10 ms so fallback polling, controller tick, and initial
# backoff all align at 100 Hz.
poll_interval_ms = 10

[safety]
# `cortex` refuses to enable a motor whose inventory entry lacks
# `verified: true`. The Rust driver enforces the same gate; this is belt +
# suspenders. Override only for benchtop commissioning of a fresh motor.
require_verified = true

# Maximum tolerated age of cached telemetry, in ms, on the jog path.
# Pinned here (not just defaulted) because the right value is bus-shaped:
# the type-17 fallback round-robins across motors at roughly
# `telemetry.poll_interval_ms × motors_per_bus + slack` per role, so an
# idle motor's `state.latest` row only refreshes every ~100 ms even
# under healthy conditions. 250 ms absorbs that worst-case fallback
# gap (still ~25 missed type-2 frames at 100 Hz, so a real mid-sweep
# stall still fails closed within ~4 SPA tick budgets).
#
# The SPA mirror in `link/src/components/actuator/motion-tests-card.tsx`
# reads the same value; bump both together if you change this.
max_feedback_age_ms = 250

# Slow-ramp homer tick and per-tick setpoint increment. At 10 ms +
# 0.004 rad, nominal homing speed stays ~0.4 rad/s (~23 deg/s), matching
# previous behavior but with 5x finer control updates.
tick_interval_ms = 10
step_size_rad = 0.004

# Success window for the home-ramp homer ("we have arrived at the
# target"). Must be comfortably larger than `step_size_rad`, otherwise
# a single-tick overshoot at terminal-approach velocity puts the motor
# back outside the deadband on the very next tick, the homer flips
# `direction`, and the motor audibly limit-cycles (vibrates/bounces
# about the home pose) for a couple seconds before the natural decay
# parks it inside the band. At 0.010 rad (~0.57°, 2.5x the default
# `step_size_rad`) the deadband absorbs the worst-case single-tick
# overshoot, and the home_ramp's early in-tolerance break exits Ok
# the FIRST fresh tick the motor lands in the band — no bounce.
# Tighten only with a hardware-in-the-loop reason to trust a
# sub-half-degree home position.
target_tolerance_rad = 0.010

# Consecutive fresh in-tolerance telemetry samples before declaring home-ramp success.
# Default 5 (~50 ms at `tick_interval_ms=10`). See `SafetyConfig::target_dwell_ticks`.
target_dwell_ticks = 5

# Post-home **MIT** spring-damper hold (operation mode, run_mode = 0). After a
# successful home-ramp the worker writes a single MIT control frame with
# vel = 0, torque_ff = 0, and these standing kp/kd values; the firmware then
# closes the loop on encoder + kp/kd alone — no streaming velocity setpoint, so
# no servo whine and no continuous current draw the way PP (run_mode = 1)
# would produce. Resists droop on gravity-loaded joints and snaps back to home
# when nudged, with stiffness/damping you can tune by eye.
#
# Defaults are deliberately conservative; per-joint overrides will land on
# the inventory `Actuator` once we have bench data.
hold_kp_nm_per_rad = 10.0
hold_kd_nm_s_per_rad = 0.5

# Tolerance for the boot orchestrator's add_offset readback check
# (commissioned-zero quick-home plan, Phase C). On every boot the
# orchestrator reads firmware param 0x702B over CAN and compares it
# against the `commissioned_zero_offset` recorded in inventory.yaml.
# A mismatch larger than this lands the motor in
# `BootState::OffsetChanged` and refuses motion until the operator
# either re-commissions (POST /commission) or restores the stored
# value (POST /restore_offset).
#
# 1e-3 rad ≈ 0.057°: tight enough to catch a deliberate set_zero from
# the bench tool, loose enough to ignore the usual firmware-side float
# rounding when the same value survives a flash round-trip.
commission_readback_tolerance_rad = 1e-3

# Master switch for the boot orchestrator's auto-home flow. With true
# (the default), every commissioned motor whose first valid telemetry
# lands InBand is automatically driven to its predefined_home_rad via
# the home-ramp homer — the operator never has to click Verify & Home
# on every boot for those motors. Uncommissioned motors continue to
# require the manual Verify & Home flow regardless.
#
# Flip to false as an escape hatch during a hardware investigation;
# commissioned motors then need the manual flow until you flip it back.
# No commissioning state on disk is touched.
auto_home_on_boot = true

# Number of consecutive fresh telemetry ticks (after
# `tracking_error_grace_ticks`) with the home-ramp homer's per-tick
# `enforce_position_with_path` returning a band violation that must
# elapse before the homer aborts with `path_violation`.
#
# The home-ramp is a velocity-feedforward controller, not a position
# controller. On a gravity-loaded joint (shoulder_pitch, elbow_pitch)
# whose `predefined_home_rad` sits within ~step_size_rad of a band
# edge, the firmware velocity loop's deceleration carries the physical
# position past the edge by ≪ step_size_rad before the home-ramp's
# *reactive* `governing` flip — observed on the next telemetry tick —
# can reverse the velocity command. With this debounce at 1 (the
# legacy single-sample abort) that physically inevitable single-tick
# excursion landed `right_arm.shoulder_pitch` (and friends) in
# `BootState::HomeFailed { reason: "path_violation" }` even though the
# motor was already on its way back into band.
#
# At the default of 15 (~150 ms with the default tick_interval_ms) the
# homer absorbs the one-or-two tick excursion the velocity loop's
# reaction takes to undo, while still aborting promptly on a motor
# that genuinely keeps drifting outside the band. Combined with the
# predictive band-edge velocity taper inside `home_ramp` (which
# pre-decelerates as `last_measured` approaches the band edge,
# regardless of where the home target sits in the band), single-tick
# overshoots now happen at ≪ step_size_rad and the debounce only
# bites on actual sustained excursions.
#
# Set to 1 to restore the legacy single-sample abort (e.g. for a
# bench-test investigation that wants to prove an overshoot exists).
# `homer_timeout_ms` and the unconditional motor-stop on every exit
# path still backstop a motor that genuinely refuses to come back into
# band — debounce only delays the reason flip, it does not let a
# runaway joint travel any further than the tracking-error gate would.
band_violation_debounce_ticks = 15

# After SocketCAN workers start, run one active discovery scan (type-17
# probes across 0x01..0x7F on each configured bus). Disable to trim boot
# latency or on noisy test benches.
scan_on_boot = true
