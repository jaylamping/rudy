# diagnostic_aggregator configuration (Murphy).
# See: https://github.com/ros/diagnostics/tree/ros2/diagnostic_aggregator
analyzers:
  ros__parameters:
    analyzers:
      murphy:
        type: diagnostic_aggregator/AnalyzerGroup
        path: murphy
        analyzers:
          system:
            type: diagnostic_aggregator/GenericAnalyzer
            path: system
            startswith: ["murphy"]
            timeout: 5.0
            num_items: 1
